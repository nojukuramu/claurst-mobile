name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-rust/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 26
        run: |
          sdkmanager --install "ndk;26.3.11579264" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Build CLAURST binary for arm64-v8a
        working-directory: src-rust
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          mkdir -p ../android/app/src/main/assets/bin/arm64-v8a
          cargo ndk \
            --target aarch64-linux-android \
            --platform 26 \
            -- build --release --bin claurst --no-default-features
          cp target/aarch64-linux-android/release/claurst \
             ../android/app/src/main/assets/bin/arm64-v8a/claurst

      - name: Build CLAURST binary for x86_64
        working-directory: src-rust
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          mkdir -p ../android/app/src/main/assets/bin/x86_64
          cargo ndk \
            --target x86_64-linux-android \
            --platform 26 \
            -- build --release --bin claurst --no-default-features
          cp target/x86_64-linux-android/release/claurst \
             ../android/app/src/main/assets/bin/x86_64/claurst

      - name: Download xterm.js assets
        run: |
          mkdir -p android/app/src/main/assets/xterm
          curl -fsSL -o android/app/src/main/assets/xterm/xterm.js \
            https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js
          curl -fsSL -o android/app/src/main/assets/xterm/xterm.css \
            https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css

      - name: Grant execute permission for gradlew
        working-directory: android
        run: |
          chmod +x gradlew
          # Download the Gradle wrapper JAR (not committed to source control).
          GRADLE_VER="8.8"
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v${GRADLE_VER}.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: claurst-mobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: claurst-mobile-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
