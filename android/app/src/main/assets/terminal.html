<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ClaURST Terminal</title>

  <!-- xterm.js is downloaded by the build pipeline into assets/xterm/ -->
  <link rel="stylesheet" href="xterm/xterm.css" />

  <script>
    // Buffer early data if Android evaluates JS before xterm.js has initialized.
    window.earlyOutputBuffer = [];
    window.writeOutput = function (data) {
      window.earlyOutputBuffer.push(data);
    };
    window.clearTerminal = function () {};
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1e1e2e;  /* Catppuccin Mocha base */
      overflow: hidden;
    }
    #terminal-container {
      width: 100%; height: 100%;
    }
    #fallback-terminal {
      width: 100%;
      height: 100%;
      display: none;
      padding: 12px;
      color: #cdd6f4;
      font-family: monospace;
      font-size: 14px;
    }
    #fallback-status {
      color: #f9e2af;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
    #fallback-output {
      width: 100%;
      height: calc(100% - 72px);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 8px;
      border: 1px solid #45475a;
      padding: 8px;
      border-radius: 6px;
    }
    #fallback-input-visible {
      width: 100%;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #45475a;
      background: #11111b;
      color: #cdd6f4;
      padding: 8px;
      font-family: monospace;
    }
    /* Soft keyboard helper — a hidden textarea that captures typed characters
       when the user taps the screen on mobile. */
    #soft-keyboard-input {
      position: fixed;
      top: -200px;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="terminal-container"></div>
<div id="fallback-terminal">
  <div id="fallback-status">xterm.js missing. Using basic terminal mode.</div>
  <div id="fallback-output"></div>
  <input id="fallback-input-visible" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="Type command and press Enter" />
</div>
<textarea id="soft-keyboard-input"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"></textarea>

<script src="xterm/xterm.js"></script>
<script>
(function () {
  'use strict';

  function sendToHost(data) {
    if (typeof Android !== 'undefined') {
      Android.sendInput(data);
    }
  }

  var hasXterm = (typeof Terminal !== 'undefined');
  var term = null;
  var fallbackOutput = null;
  var fallbackInputVisible = null;

  /* ---------- Terminal setup -------------------------------------------- */
  if (hasXterm) {
    term = new Terminal({
      theme: {
        background:    '#1e1e2e',
        foreground:    '#cdd6f4',
        cursor:        '#f5e0dc',
        cursorAccent:  '#1e1e2e',
        selectionBackground: 'rgba(147,153,178,0.3)',
        black:   '#45475a', red:     '#f38ba8',
        green:   '#a6e3a1', yellow:  '#f9e2af',
        blue:    '#89b4fa', magenta: '#f5c2e7',
        cyan:    '#94e2d5', white:   '#bac2de',
        brightBlack:   '#585b70', brightRed:     '#f38ba8',
        brightGreen:   '#a6e3a1', brightYellow:  '#f9e2af',
        brightBlue:    '#89b4fa', brightMagenta: '#f5c2e7',
        brightCyan:    '#94e2d5', brightWhite:   '#a6adc8'
      },
      fontFamily: 'monospace',
      fontSize:   14,
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback:  5000,
      convertEol:  false,
      allowProposedApi: true
    });

    term.open(document.getElementById('terminal-container'));
  } else {
    document.getElementById('terminal-container').style.display = 'none';
    var fallback = document.getElementById('fallback-terminal');
    fallback.style.display = 'block';
    fallbackOutput = document.getElementById('fallback-output');
    fallbackInputVisible = document.getElementById('fallback-input-visible');
    fallbackInputVisible.addEventListener('input', function () {
      var val = fallbackInputVisible.value;
      if (val.length > 0) {
        sendToHost(val);
        fallbackInputVisible.value = '';
      }
    });
    fallbackInputVisible.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendToHost('\r');
      } else if (e.key === 'Tab') {
        e.preventDefault();
        sendToHost('\t');
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        sendToHost('\x7f');
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        sendToHost('\x1b[A');
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        sendToHost('\x1b[B');
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        sendToHost('\x1b[C');
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        sendToHost('\x1b[D');
      }
    });
    if (typeof Android !== 'undefined') {
      Android.onResize(80, 24);
    }
  }

  /* ---------- Resize handling ------------------------------------------- */
  // Measure a single monospace character using an off-screen canvas to get
  // accurate cell dimensions without relying on xterm.js private internals.
  function measureCharSize() {
    if (!term) return { width: 8, height: 16 };
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    ctx.font = term.options.fontSize + 'px ' + term.options.fontFamily;
    var width  = ctx.measureText('W').width  || 8;
    var height = term.options.fontSize * (term.options.lineHeight || 1.2);
    return { width: Math.ceil(width), height: Math.ceil(height) };
  }

  function fitTerminal() {
    if (!term) return;
    var container = document.getElementById('terminal-container');
    // If the WebView layout hasn't completed yet, clientWidth/clientHeight will
    // be 0, which would produce incorrect column/row counts (clamped to 10×4).
    // Retry on the next animation frame until the container has real dimensions.
    if (container.clientWidth === 0 || container.clientHeight === 0) {
      requestAnimationFrame(fitTerminal);
      return;
    }
    var cell = measureCharSize();
    var cols = Math.max(10, Math.floor(container.clientWidth  / cell.width));
    var rows = Math.max(4,  Math.floor(container.clientHeight / cell.height));
    if (cols !== term.cols || rows !== term.rows) {
      term.resize(cols, rows);
      if (typeof Android !== 'undefined') {
        Android.onResize(cols, rows);
      }
    }
  }

  window.addEventListener('resize', fitTerminal);
  // Trigger initial fit; self-retries via requestAnimationFrame when layout
  // dimensions are not yet available instead of relying on a fixed timeout.
  fitTerminal();

  /* ---------- Input routing --------------------------------------------- */
  if (term) {
    term.onData(function (data) {
      sendToHost(data);
    });
  }

  /* ---------- Soft keyboard (mobile) ------------------------------------ */
  var skInput = document.getElementById('soft-keyboard-input');
  document.getElementById('terminal-container').addEventListener('click', function () {
    skInput.focus();
  });
  skInput.addEventListener('input', function () {
    var val = skInput.value;
    if (val.length > 0) {
      sendToHost(val);
      skInput.value = '';
    }
  });
  skInput.addEventListener('keydown', function (e) {
    var map = {
      Backspace: '\x7f', Tab: '\t', Enter: '\r',
      ArrowUp: '\x1b[A', ArrowDown: '\x1b[B',
      ArrowRight: '\x1b[C', ArrowLeft: '\x1b[D',
      Escape: '\x1b', Delete: '\x1b[3~',
      Home: '\x1bOH', End: '\x1bOF',
      PageUp: '\x1b[5~', PageDown: '\x1b[6~',
      F1: '\x1bOP',  F2: '\x1bOQ',  F3: '\x1bOR',  F4: '\x1bOS',
      F5: '\x1b[15~', F6: '\x1b[17~', F7: '\x1b[18~', F8: '\x1b[19~'
    };
    var seq = map[e.key];
    if (seq) {
      e.preventDefault();
      sendToHost(seq);
    }
  });

  /* ---------- Output API (called from Kotlin) --------------------------- */

  /**
   * writeOutput(data: string)
   * Called by TerminalActivity via evaluateJavascript to push data from the
   * process's PTY master into the xterm.js renderer.
   */
  window.writeOutput = function (data) {
    if (term) {
      term.write(data);
      return;
    }
    if (fallbackOutput) {
      fallbackOutput.textContent += data;
      fallbackOutput.scrollTop = fallbackOutput.scrollHeight;
    }
  };

  /**
   * clearTerminal()
   * Clears the terminal viewport (e.g. on reconnect).
   */
  window.clearTerminal = function () {
    if (term) {
      term.clear();
      return;
    }
    if (fallbackOutput) {
      fallbackOutput.textContent = '';
    }
  };

  /* ---------- Flush early output ---------------------------------------- */
  if (window.earlyOutputBuffer && window.earlyOutputBuffer.length > 0) {
    for (var i = 0; i < window.earlyOutputBuffer.length; i++) {
      window.writeOutput(window.earlyOutputBuffer[i]);
    }
    window.earlyOutputBuffer = [];
  }

})();
</script>
</body>
</html>
