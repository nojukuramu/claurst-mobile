# Rust cross-compilation configuration for Android targets.
#
# When building for Android with `cargo ndk` the linker is provided
# automatically.  The manual linker entries below are used as a fallback
# when cargo-ndk is not available and the NDK bin directory is already on PATH.

[target.aarch64-linux-android]
linker = "aarch64-linux-android26-clang"
ar     = "llvm-ar"

[target.x86_64-linux-android]
linker = "x86_64-linux-android26-clang"
ar     = "llvm-ar"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi26-clang"
ar     = "llvm-ar"
